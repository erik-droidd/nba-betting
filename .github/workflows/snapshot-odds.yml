name: snapshot-odds

# Runs odds snapshots on GitHub's infrastructure so they keep flowing
# while the user (Europe-based) is asleep during the NBA overnight
# window. The runner appends records to a JSONL file under
# `data/odds_snapshots/` and commits them back to the repo; the user's
# local machine picks them up with `git pull` and
# `python3 -m nba_betting import-snapshots`.
#
# Cadence: shifted earlier + denser in the pre-tipoff window.
# Rationale: the capture function filters to STATUS_SCHEDULED games
# only (stats.nba.com `gameStatus==1` / ESPN `STATUS_SCHEDULED`), so
# runs during the live-game window produced nothing useful — they
# logged `games=0 no games scheduled` as warnings. The previous
# 22:00–06:30 UTC schedule spent 12 of 19 daily runs inside the
# live-game window (00:00–05:00 UTC) and had zero coverage of the
# afternoon injury-news window (14:00–22:00 UTC) which is when sharp
# action moves lines most.
#
# New schedule (all UTC):
#   13:00-17:00  hourly                — late-morning + early weekend tipoffs + Woj/Shams window
#   18:00-21:30  every 30 min          — afternoon build-up (2–5:30 PM ET), heaviest injury-news hours
#   22:00-01:45  every 15 min          — dense approach to + through ET tipoff cluster
#   02:00-02:45  every 15 min          — West Coast closing line (10 PM ET tipoffs)
#
# Stops at 03:00 UTC: by then all ET games are live/final and West
# Coast games have tipped off, so further snapshots capture nothing.
# Picks back up at 13:00 UTC the next day, giving EU users a fresh
# overnight commit history by morning.
# Explicit `workflow_dispatch` for manual smoke testing from the Actions
# tab — critical during offseason when cron can't be verified against a
# real game. See USAGE.md §"Running snapshots remotely" for details.
#
# Note on GitHub's 60-day inactivity rule: scheduled workflows are
# automatically disabled if the repo has no commits for 60 days. NBA
# offseason (Jun–Oct) easily exceeds this. We mitigate in two ways:
#   1. The workflow pushes a commit each day it runs, keeping activity
#      visible.
#   2. USAGE.md documents the manual re-enable step for the first run
#      after offseason.

on:
  schedule:
    # Morning + midday (hourly): late-morning injury-news window and
    # early-afternoon weekend tipoffs (e.g. 1 PM ET Saturday = 17:00 UTC).
    - cron: "0 13-17 * * *"
    # Afternoon build-up (every 30 min, 18:00–21:30 UTC = 2–5:30 PM ET):
    # primary Woj/Shams drop window, sharp money often hits here.
    - cron: "0,30 18-21 * * *"
    # Dense approach to ET tipoff cluster (every 15 min, 22:00–23:45 UTC):
    # critical for CLV — need a fresh snapshot within minutes of tipoff.
    - cron: "0,15,30,45 22,23 * * *"
    # Through ET tipoffs + early West Coast pre-tipoff (00:00–01:45 UTC):
    # every 15 min. The 00:00/00:30 UTC runs capture closing line for
    # 7:30/8 PM ET tipoffs during EDT, 7 PM ET tipoffs during EST.
    - cron: "0,15,30,45 0,1 * * *"
    # West Coast closing line (02:00–02:45 UTC): every 15 min for
    # 10 PM ET tipoffs. After 03:00 UTC all games are live → stop.
    - cron: "0,15,30,45 2 * * *"
  workflow_dispatch:
    # Manual trigger. Useful for smoke-testing the pipeline end-to-end
    # before relying on cron, or capturing an ad-hoc snapshot.
    inputs:
      note:
        description: "Optional note (ignored; purely for audit)."
        required: false
        default: "manual"

# Required since 2023 — default GITHUB_TOKEN perms became read-only.
# Write is needed for the commit-back step below.
permissions:
  contents: write

concurrency:
  # Serialize runs so two cron firings (or a manual + cron overlap)
  # never race on the same JSONL file. `cancel-in-progress: false`
  # because we'd rather finish the earlier snapshot than drop it.
  group: snapshot-odds
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write access + the full ref so we can rebase + push
          # back. fetch-depth: 0 isn't strictly required but keeps
          # `git pull --rebase` simple.
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Capture snapshot to JSONL
        id: capture
        run: |
          python -m nba_betting snapshot-odds --jsonl data/odds_snapshots
          # Record the file we expect to have touched for the commit step.
          echo "day=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "stamp=$(date -u +'%Y-%m-%d %H:%MZ')" >> "$GITHUB_OUTPUT"

      - name: Commit & push
        env:
          DAY: ${{ steps.capture.outputs.day }}
          STAMP: ${{ steps.capture.outputs.stamp }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If snapshot-odds wrote nothing (no games / network failure),
          # don't commit — keeps history clean and avoids empty pushes.
          if [ -z "$(git status --porcelain data/odds_snapshots/)" ]; then
            echo "no new snapshot data; nothing to commit"
            exit 0
          fi

          git add "data/odds_snapshots/${DAY}.jsonl"
          # [skip ci] prevents the push from retriggering this workflow.
          git commit -m "chore(snapshots): ${STAMP} [skip ci]"

          # Rebase-retry loop handles the race where two runs finish
          # within seconds of each other (shouldn't happen given the
          # concurrency group, but cheap insurance).
          for attempt in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && \
               git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "push attempt ${attempt} failed; retrying"
            sleep $((attempt * 5))
          done
          echo "all push attempts failed"
          exit 1
