<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Betting System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid #1a1a3a;
            margin-bottom: 30px;
        }
        header h1 { font-size: 28px; color: #fff; margin-bottom: 5px; }
        header p { color: #888; font-size: 14px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid #1a1a3a;
            padding-bottom: 10px;
        }
        .tab {
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #888;
            border: 1px solid transparent;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab:hover { color: #fff; background: #1a1a3a; }
        .tab.active { color: #4fc3f7; border-color: #4fc3f7; background: #0d1b2a; }
        .panel { display: none; }
        .panel.active { display: block; }

        /* Predictions Table */
        .predictions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .predictions-header h2 { font-size: 20px; }
        .model-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            background: #1a3a2a;
            color: #4caf50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0d0d2b;
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background: #12123a;
            padding: 12px 15px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.5px;
        }
        td {
            padding: 12px 15px;
            border-top: 1px solid #1a1a3a;
            font-size: 14px;
        }
        tr:hover td { background: #12124a; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        /* Badges */
        .badge {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-suspect { background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
        .badge-strong { background: #1a3a1a; color: #4caf50; }
        .badge-moderate { background: #3a3a1a; color: #ffc107; }
        .badge-lean { background: #2a2a1a; color: #ff9800; }
        .badge-nobet { background: #1a1a2a; color: #666; }

        /* Edge colors */
        .edge-positive { color: #4caf50; }
        .edge-negative { color: #f44336; }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #0d0d2b;
            border-radius: 8px;
            padding: 18px;
            border: 1px solid #1a1a3a;
        }
        .stat-card .label { font-size: 12px; color: #888; text-transform: uppercase; }
        .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 5px; }
        .stat-card .value.green { color: #4caf50; }
        .stat-card .value.red { color: #f44336; }
        .stat-card .value.blue { color: #4fc3f7; }

        /* Elo table */
        .elo-rank { color: #888; font-size: 13px; }
        .elo-diff-pos { color: #4caf50; }
        .elo-diff-neg { color: #f44336; }

        /* Loading */
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { text-align: center; padding: 20px; color: #f44336; }

        /* Prob bar */
        .prob-bar {
            display: flex;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
            background: #1a1a3a;
        }
        .prob-bar .model { background: #4fc3f7; }
        .prob-bar .market { background: #ff9800; }

        .prob-legend { display: flex; gap: 15px; margin-bottom: 15px; font-size: 12px; color: #888; }
        .prob-legend span::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }
        .prob-legend .model-leg::before { background: #4fc3f7; }
        .prob-legend .market-leg::before { background: #ff9800; }

        .matchup-cell { font-weight: 600; }
        .refresh-btn {
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid #4fc3f7;
            background: transparent;
            color: #4fc3f7;
            cursor: pointer;
            font-size: 13px;
        }
        .refresh-btn:hover { background: #0d1b2a; }
        .summary-bar {
            margin-top: 15px;
            padding: 12px 18px;
            background: #0d1b2a;
            border-radius: 8px;
            border: 1px solid #1a2a3a;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        /* Secondary rows beneath each game */
        .sub-row td { padding: 2px 16px 4px; border: none; font-size: 0.85em; }
        .pick-row { color: #4fc3f7; }
        .pick-row strong { color: #4fc3f7; }
        .pick-row .muted { color: #7088a8; }
        .drivers-row { color: #a0a0bb; }
        .drivers-row .driver-chip {
            display: inline-block;
            padding: 1px 8px;
            margin-right: 6px;
            border-radius: 10px;
            background: #12123a;
            color: #c0c0d8;
            font-size: 0.95em;
        }
        .drivers-row .driver-chip .delta-pos { color: #4caf50; }
        .drivers-row .driver-chip .delta-neg { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NBA Betting System</h1>
            <p>Elo + Gradient Boosting Ensemble &bull; Polymarket Odds &bull; Kelly Criterion</p>
        </header>

        <div class="tabs">
            <div class="tab active" data-panel="predictions">Predictions</div>
            <div class="tab" data-panel="elo">Elo Ratings</div>
            <div class="tab" data-panel="performance">Performance</div>
        </div>

        <!-- Predictions Panel -->
        <div id="predictions" class="panel active">
            <div class="predictions-header">
                <h2 id="predictions-title">Today's Recommendations</h2>
                <div>
                    <span id="model-badge" class="model-badge">Loading...</span>
                    <button class="refresh-btn" onclick="loadPredictions()">Refresh</button>
                </div>
            </div>
            <div class="prob-legend">
                <span class="model-leg">Model Prob</span>
                <span class="market-leg">Market Prob</span>
            </div>
            <div id="predictions-content"><div class="loading">Loading predictions...</div></div>
        </div>

        <!-- Elo Panel -->
        <div id="elo" class="panel">
            <h2 style="margin-bottom: 15px;">Current Elo Ratings</h2>
            <div id="elo-content"><div class="loading">Loading ratings...</div></div>
        </div>

        <!-- Performance Panel -->
        <div id="performance" class="panel">
            <h2 style="margin-bottom: 15px;">Betting Performance</h2>
            <div id="performance-content"><div class="loading">Loading performance data...</div></div>
        </div>
    </div>

    <script>
        const API = '/api';

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.panel).classList.add('active');
            });
        });

        function pct(val) { return (val * 100).toFixed(1) + '%'; }
        function usd(val) { return '$' + val.toFixed(0); }

        function badgeClass(badge) {
            return { SUSPECT: 'badge-suspect', STRONG: 'badge-strong', MODERATE: 'badge-moderate', LEAN: 'badge-lean' }[badge] || 'badge-nobet';
        }

        async function loadPredictions() {
            const el = document.getElementById('predictions-content');
            el.innerHTML = '<div class="loading">Loading predictions...</div>';
            try {
                const resp = await fetch(`${API}/predictions/today`);
                const data = await resp.json();

                document.getElementById('model-badge').textContent = data.model + ' model';

                const titleEl = document.getElementById('predictions-title');
                if (data.showing_date) {
                    titleEl.textContent = `Recommendations for ${data.showing_date} (next game day)`;
                } else {
                    titleEl.textContent = "Today's Recommendations";
                }

                if (!data.games || data.games.length === 0) {
                    el.innerHTML = `<div class="loading">${data.message || 'No games scheduled.'}</div>`;
                    return;
                }

                const bets = data.games.filter(g => g.bet_side !== 'NO BET');
                const totalExposure = bets.reduce((s, g) => s + g.bet_size, 0);

                let html = `<table>
                    <thead><tr>
                        <th>Matchup</th>
                        <th class="text-center">Model</th>
                        <th class="text-center">Market</th>
                        <th class="text-center">Bet</th>
                        <th class="text-right">Edge</th>
                        <th class="text-right">Kelly</th>
                        <th class="text-right">Size</th>
                        <th class="text-center">Signal</th>
                    </tr></thead><tbody>`;

                for (const g of data.games) {
                    const edgeClass = g.edge > 0 ? 'edge-positive' : 'edge-negative';
                    const isBet = g.bet_side !== 'NO BET';
                    // Use the post-shrinkage probability — the same one
                    // the edge math was computed against — so the user
                    // sees a model% / market% / edge% triple that
                    // actually reconciles. Fall back to raw model when
                    // shrinkage wasn't applied (no market price).
                    const displayHomeProb = (g.shrunken_home_prob != null) ? g.shrunken_home_prob : g.model_home_prob;

                    // Build the secondary pick row: spread/total model calls
                    // from spreads_totals.generate_spread_total_picks. Only
                    // render when at least one side (spread or total) is an
                    // actionable pick, or when we have a meaningful edge
                    // against the market line.
                    const spreadActionable = g.spread_pick && g.spread_pick !== 'NO BET';
                    const totalActionable = g.total_pick && g.total_pick !== 'NO BET';
                    let pickRowHtml = '';
                    if (spreadActionable || totalActionable) {
                        const parts = [];
                        if (spreadActionable) {
                            const edgeStr = g.spread_edge != null ? `${g.spread_edge > 0 ? '+' : ''}${g.spread_edge.toFixed(1)} pts` : '';
                            parts.push(
                                `<strong>Spread:</strong> ${g.spread_pick}` +
                                (g.predicted_spread != null ? ` <span class="muted">(model: ${g.predicted_spread > 0 ? '+' : ''}${g.predicted_spread.toFixed(1)}, edge: ${edgeStr})</span>` : '')
                            );
                        }
                        if (totalActionable) {
                            const edgeStr = g.total_edge != null ? `${g.total_edge > 0 ? '+' : ''}${g.total_edge.toFixed(1)} pts` : '';
                            parts.push(
                                `<strong>Total:</strong> ${g.total_pick}` +
                                (g.predicted_total != null ? ` <span class="muted">(model: ${g.predicted_total.toFixed(1)}, edge: ${edgeStr})</span>` : '')
                            );
                        }
                        pickRowHtml = `<tr class="sub-row pick-row"><td colspan="9">${parts.join(' &nbsp;•&nbsp; ')}</td></tr>`;
                    }

                    // Top model drivers — LOO-to-mean attribution from the
                    // base GBM, keyed by (home_id, away_id). Only present for
                    // actionable bets (see recommendations.generate_recommendations).
                    let driversRowHtml = '';
                    if (isBet && Array.isArray(g.drivers) && g.drivers.length > 0) {
                        const chips = g.drivers.slice(0, 3).map(d => {
                            const delta = d.delta ?? 0;
                            const pctStr = (delta >= 0 ? '+' : '') + (delta * 100).toFixed(1) + '%';
                            const cls = delta >= 0 ? 'delta-pos' : 'delta-neg';
                            // Humanize light: convert common prefixes/suffixes.
                            const label = String(d.feature || '').replace(/_/g, ' ');
                            return `<span class="driver-chip">${label} <span class="${cls}">${pctStr}</span></span>`;
                        }).join('');
                        driversRowHtml = `<tr class="sub-row drivers-row"><td colspan="9"><span class="muted" style="margin-right:8px">Model drivers:</span>${chips}</td></tr>`;
                    }

                    html += `<tr>
                        <td class="matchup-cell">${g.away_team} @ ${g.home_team}
                            <div class="prob-bar">
                                <div class="model" style="width:${displayHomeProb*100}%"></div>
                            </div>
                            ${g.market_home_prob > 0 ? `<div class="prob-bar"><div class="market" style="width:${g.market_home_prob*100}%"></div></div>` : ''}
                        </td>
                        <td class="text-center">${pct(displayHomeProb)}</td>
                        <td class="text-center">${g.market_home_prob > 0 ? pct(g.market_home_prob) : 'N/A'}</td>
                        <td class="text-center">${isBet ? (g.bet_side === 'HOME' ? g.home_team : g.away_team) : '—'}</td>
                        <td class="text-right ${edgeClass}">${isBet ? (g.edge > 0 ? '+' : '') + pct(g.edge) : '—'}</td>
                        <td class="text-right">${isBet ? pct(g.kelly_pct) : '—'}</td>
                        <td class="text-right">${isBet ? usd(g.bet_size) : '—'}</td>
                        <td class="text-center"><span class="badge ${badgeClass(g.badge)}">${g.badge}</span></td>
                    </tr>
                    ${g.badge === 'SUSPECT' ? `<tr><td colspan="9" style="padding:2px 16px 4px;border:none"><strong style="color:#f44336;font-size:0.85em">⚠ SUSPECT EDGE (${pct(g.edge)}) — Edge exceeds 15%, likely a data or model issue. Verify market odds manually before betting.</strong></td></tr>` : ''}
                    ${g.explanation ? `<tr><td colspan="9" style="padding:2px 16px 8px;border:none"><em style="color:#999;font-size:0.85em">${g.spread != null ? `Spread: ${g.spread > 0 ? '+' : ''}${g.spread} | ` : ''}${g.over_under != null ? `O/U: ${g.over_under} | ` : ''}${g.explanation}</em></td></tr>` : ''}
                    ${pickRowHtml}
                    ${driversRowHtml}`;
                }

                html += '</tbody></table>';

                if (bets.length > 0) {
                    html += `<div class="summary-bar">
                        <span><strong>${bets.length}</strong> actionable bet(s)</span>
                        <span>Total exposure: <strong>${usd(totalExposure)}</strong></span>
                    </div>`;
                }

                el.innerHTML = html;
            } catch (err) {
                el.innerHTML = `<div class="error">Failed to load: ${err.message}</div>`;
            }
        }

        async function loadElo() {
            const el = document.getElementById('elo-content');
            try {
                const resp = await fetch(`${API}/elo`);
                const data = await resp.json();

                let html = '<table><thead><tr><th>#</th><th>Team</th><th class="text-right">Elo</th><th class="text-right">vs Avg</th></tr></thead><tbody>';

                data.ratings.forEach((r, i) => {
                    const diff = r.elo - 1500;
                    const cls = diff > 0 ? 'elo-diff-pos' : diff < 0 ? 'elo-diff-neg' : '';
                    html += `<tr>
                        <td class="elo-rank">${i + 1}</td>
                        <td><strong>${r.team}</strong></td>
                        <td class="text-right">${Math.round(r.elo)}</td>
                        <td class="text-right ${cls}">${diff > 0 ? '+' : ''}${Math.round(diff)}</td>
                    </tr>`;
                });

                html += '</tbody></table>';
                el.innerHTML = html;
            } catch (err) {
                el.innerHTML = `<div class="error">Failed to load: ${err.message}</div>`;
            }
        }

        async function loadPerformance() {
            const el = document.getElementById('performance-content');
            try {
                const resp = await fetch(`${API}/performance`);
                const data = await resp.json();

                if (data.resolved === 0) {
                    el.innerHTML = '<div class="loading">No resolved predictions yet. Run predictions and sync results to see performance.</div>';
                    return;
                }

                const roiClass = data.roi >= 0 ? 'green' : 'red';
                const profitClass = data.total_profit >= 0 ? 'green' : 'red';

                el.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="label">Prediction Accuracy</div>
                            <div class="value blue">${pct(data.prediction_accuracy)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Bet Win Rate</div>
                            <div class="value blue">${pct(data.bet_win_rate)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Total Profit</div>
                            <div class="value ${profitClass}">${data.total_profit >= 0 ? '+' : ''}$${data.total_profit.toFixed(2)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">ROI</div>
                            <div class="value ${roiClass}">${data.roi >= 0 ? '+' : ''}${pct(data.roi)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Total Bets</div>
                            <div class="value">${data.total_bets}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Win/Loss</div>
                            <div class="value">${data.wins}/${data.losses}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Current Bankroll</div>
                            <div class="value">$${data.current_bankroll.toFixed(0)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Max Drawdown</div>
                            <div class="value red">${pct(data.max_drawdown)}</div>
                        </div>
                    </div>
                `;
            } catch (err) {
                el.innerHTML = `<div class="error">Failed to load: ${err.message}</div>`;
            }
        }

        // Load all data
        loadPredictions();
        loadElo();
        loadPerformance();
    </script>
</body>
</html>
